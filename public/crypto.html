<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсы Криптовалют</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Soyuz+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-1: #05081a;
            --bg-gradient-2: #0f1235;
            --bg-gradient-3: #1a1f4f;
            --bg-gradient-4: #0d1230;
            --container-bg: rgba(10, 15, 40, 0.75);
            --container-border: rgba(50, 90, 180, 0.3);
            --text-primary: #e6f0ff;
            --text-secondary: #8ab4f8;
            --border-color: rgba(70, 110, 200, 0.2);
            --hover-bg: rgba(70, 110, 200, 0.12);
            --table-header-bg: rgba(20, 50, 130, 0.95);
            --table-header-text: #ffffff;
            --positive: #4ade80;
            --negative: #f87171;
            --neutral: #60a5fa;
            --modal-bg: rgba(10, 15, 40, 0.9);
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --button-bg: rgba(30, 60, 120, 0.4);
            --button-border: rgba(70, 130, 220, 0.5);
            --button-text: #93c5fd;
            --button-hover: rgba(70, 130, 220, 0.25);
            --button-active-bg: rgba(40, 90, 200, 0.9);
            --button-active-text: white;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-strong: 0 25px 80px rgba(0, 0, 0, 0.6);
            --glass-blur: blur(25px);
            --glow-intensity: 0 0 25px rgba(50, 100, 200, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Soyuz Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 700;
            min-height: 100vh;
            padding: 10px;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-4));
            transition: all 0.5s ease;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--container-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--container-border);
            border-radius: 24px;
            box-shadow: var(--shadow-strong), var(--glow-intensity);
            padding: 20px;
            opacity: 0;
            transform: translateY(60px);
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header-left h1 { 
            color: var(--button-text);
            font-size: 1.8em;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.3s forwards;
            text-shadow: 0 0 15px rgba(60, 120, 255, 0.4);
            font-weight: 700;
            font-family: 'Soyuz Grotesk', sans-serif;
        }
        
        .subtitle { 
            color: var(--text-secondary); 
            font-size: 1em;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.5s forwards;
            font-weight: 400;
            font-family: 'Soyuz Grotesk', sans-serif;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading { 
            text-align: center; 
            font-size: 18px; 
            margin-top: 50px; 
            color: var(--button-text);
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.4s forwards;
            text-shadow: 0 0 10px rgba(60, 120, 255, 0.3);
            font-family: 'Soyuz Grotesk', sans-serif;
            font-weight: 700;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.6s forwards;
        }
        
        .sort-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .sort-btn {
            background: var(--button-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--button-text);
            border: 1px solid var(--button-border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(60, 120, 255, 0.15), var(--glow-intensity);
            font-family: 'Soyuz Grotesk', sans-serif;
        }
        
        .sort-btn:hover {
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(60, 120, 255, 0.25), 0 0 20px rgba(60, 120, 255, 0.4);
        }
        
        .sort-btn.active {
            background: var(--button-active-bg);
            color: var(--button-active-text);
            border-color: transparent;
            box-shadow: 0 6px 20px rgba(60, 120, 255, 0.3), 0 0 25px rgba(60, 120, 255, 0.6);
        }
        
        .sort-btn .arrow {
            font-size: 0.8em;
        }
        
        .table-wrapper { 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        table { 
            width: 100%; 
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px; 
            min-width: 650px;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            box-shadow: 0 0 15px rgba(60, 120, 255, 0.2);
            border-radius: 12px;
        }
        
        table.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        thead { 
            background: var(--table-header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--table-header-text);
            box-shadow: 0 0 20px rgba(60, 120, 255, 0.3);
        }
        
        thead tr:first-child th:first-child {
            border-top-left-radius: 15px;
        }
        
        thead tr:first-child th:last-child {
            border-top-right-radius: 15px;
        }
        
        th, td { 
            padding: 12px 8px; 
            text-align: left; 
            border-bottom: 1px solid var(--border-color); 
            white-space: nowrap; 
            font-family: 'Soyuz Grotesk', sans-serif;
            font-weight: 700;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        
        th { 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.85em; 
            letter-spacing: 0.5px; 
            position: sticky; 
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        
        th:hover {
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(120, 180, 255, 0.4);
        }
        
        tbody tr { 
            cursor: pointer; 
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }
        
        tbody tr.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out, background-color 0.3s ease;
        }
        
        tbody tr:hover { 
            background-color: var(--hover-bg); 
            box-shadow: 0 0 15px rgba(60, 120, 255, 0.2);
        }
        
        .positive { color: var(--positive); font-weight: 700; text-shadow: 0 0 8px rgba(74, 222, 128, 0.3); }
        .negative { color: var(--negative); font-weight: 700; text-shadow: 0 0 8px rgba(248, 113, 113, 0.3); }
        .neutral { color: var(--neutral); font-weight: 700; text-shadow: 0 0 8px rgba(96, 165, 250, 0.3); }
        
        .coin-name { display: flex; align-items: center; gap: 8px; }
        .coin-name img { width: 28px; height: 28px; border-radius: 50%; }
        .price { font-weight: 700; color: var(--text-primary); text-shadow: 0 0 6px rgba(200, 220, 255, 0.2); }
        .market-cap { color: var(--text-secondary); font-size: 0.9em; font-weight: 700; }
        
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: var(--modal-overlay);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .modal-content {
            background-color: var(--modal-bg); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--container-border);
            margin: 10% auto; 
            padding: 20px;
            border-radius: 24px; 
            width: 95%; 
            max-width: 1000px;
            box-shadow: var(--shadow-strong), var(--glow-intensity);
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        .modal-content.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .close { 
            color: var(--text-secondary); 
            float: right; 
            font-size: 32px; 
            font-weight: 700; 
            cursor: pointer; 
            line-height: 1; 
            font-family: 'Soyuz Grotesk', sans-serif;
        }
        .close:hover { color: var(--button-text); text-shadow: 0 0 10px rgba(147, 197, 253, 0.5); }
        
        #chartTitle { color: var(--button-text); margin-bottom: 20px; font-size: 1.5em; text-shadow: 0 0 12px rgba(60, 120, 255, 0.3); font-family: 'Soyuz Grotesk', sans-serif; font-weight: 700; }
        
        .timeframe-buttons { 
            margin: 20px 0; 
            text-align: center; 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
        
        .timeframe-buttons button {
            background: var(--button-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--button-text);
            border: 1px solid var(--button-border);
            padding: 8px 20px; 
            border-radius: 25px; 
            cursor: pointer;
            font-size: 0.9em; 
            font-weight: 700; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(60, 120, 255, 0.15), var(--glow-intensity);
            font-family: 'Soyuz Grotesk', sans-serif;
        }
        .timeframe-buttons button:hover { 
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(60, 120, 255, 0.25), 0 0 20px rgba(60, 120, 255, 0.4);
        }
        .timeframe-buttons button.active {
            background: var(--button-active-bg);
            color: var(--button-active-text);
            border-color: transparent;
            box-shadow: 0 6px 20px rgba(60, 120, 255, 0.3), 0 0 25px rgba(60, 120, 255, 0.6);
        }
        
        #chartContainer { position: relative; height: 300px; margin-top: 20px; }
        
        .toast {
            visibility: hidden; 
            min-width: 250px; 
            background: var(--modal-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--container-border);
            color: var(--text-primary);
            text-align: center; 
            border-radius: 16px; 
            padding: 16px; 
            position: fixed;
            z-index: 2000; 
            left: 50%; 
            bottom: 30px; 
            transform: translateX(-50%);
            font-size: 14px; 
            box-shadow: var(--shadow-strong), var(--glow-intensity);
            font-family: 'Soyuz Grotesk', sans-serif;
            font-weight: 700;
        }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media (max-width: 768px) {
            .container { padding: 15px; border-radius: 20px; }
            h1 { font-size: 1.5em; }
            table { font-size: 0.85em; min-width: 600px; }
            th, td { padding: 10px 5px; }
            .coin-name img { width: 24px; height: 24px; }
            .modal-content { margin: 5% auto; padding: 15px; }
            #chartContainer { height: 250px; }
            .controls { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>📊 КУРСЫ КРИПТОВАЛЮТ</h1>
                <p class="subtitle">НАЖМИТЕ НА КРИПТОВАЛЮТУ ДЛЯ ПРОСМОТРА ГРАФИКА</p>
            </div>
        </div>
        
        <div id="loading" class="loading">ЗАГРУЗКА ДАННЫХ...</div>
        
        <div class="controls" id="controls" style="display:none;">
            <div class="sort-buttons">
                <button class="sort-btn active" data-sort="price">
                    ЦЕНА <span class="arrow">↓</span>
                </button>
                <button class="sort-btn" data-sort="1h">
                    1Ч % <span class="arrow">↕</span>
                </button>
                <button class="sort-btn" data-sort="24h">
                    24Ч % <span class="arrow">↕</span>
                </button>
                <button class="sort-btn" data-sort="7d">
                    7Д % <span class="arrow">↕</span>
                </button>
                <button class="sort-btn" data-sort="marketCap">
                    КАПИТАЛИЗАЦИЯ <span class="arrow">↕</span>
                </button>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table id="cryptoTable" style="display:none;">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>НАЗВАНИЕ</th>
                        <th>ЦЕНА (USD)</th>
                        <th>КАПИТАЛИЗАЦИЯ</th>
                        <th>1Ч %</th>
                        <th>24Ч %</th>
                        <th>7Д %</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chartModal" class="modal">
        <div class="modal-content" id="modalContent">
            <span class="close">&times;</span>
            <h2 id="chartTitle">ГРАФИК</h2>
            <div class="timeframe-buttons">
                <button data-days="1">1 ДЕНЬ</button>
                <button data-days="7" class="active">7 ДНЕЙ</button>
                <button data-days="30">30 ДНЕЙ</button>
                <button data-days="365">1 ГОД</button>
            </div>
            <div id="chartContainer"><canvas id="priceChart"></canvas></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const coinIds = [
            'bitcoin', 'ethereum', 'tether', 'binancecoin', 'solana', 
            'usd-coin', 'xrp', 'dogecoin', 'cardano', 'tron',
            'avalanche-2', 'shiba-inu', 'polkadot', 'chainlink', 'polygon-pos'
        ];

        let currentCoinId = null;
        let chart = null;
        let isFetching = false;
        let cryptoData = [];
        let currentSort = 'price';
        let sortDirection = 'desc';

        function showToast(message) {
            const x = document.getElementById("toast");
            x.innerText = message;
            x.className = "toast show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        function formatMarketCap(cap) {
            if (cap >= 1e12) return '$' + (cap / 1e12).toFixed(2) + 'T';
            if (cap >= 1e9) return '$' + (cap / 1e9).toFixed(2) + 'B';
            if (cap >= 1e6) return '$' + (cap / 1e6).toFixed(2) + 'M';
            return '$' + cap.toLocaleString();
        }

        function formatPrice(price) {
            if (price < 0.000001) return '$' + price.toExponential(4);
            if (price < 0.01) return '$' + price.toFixed(6);
            if (price < 1) return '$' + price.toFixed(4);
            return '$' + price.toLocaleString();
        }

        async function fetchCryptoData() {
            try {
                const url = `https://api.coingecko.com/api/v3/coins/markets?ids=${coinIds.join(',')}&vs_currency=usd&order=market_cap_desc&per_page=15&page=1&sparkline=false&price_change_percentage=1h,24h,7d`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`Ошибка API: ${response.status}`);
                const data = await response.json();
                cryptoData = data;
                renderTable();
            } catch (error) {
                document.getElementById('loading').innerText = `ОШИБКА: ${error.message}. ПОПРОБУЙТЕ ПОЗЖЕ.`;
            }
        }

        function sortData(data, sortBy, direction) {
            const sorted = [...data];
            sorted.sort((a, b) => {
                let valA, valB;
                switch(sortBy) {
                    case 'price': valA = a.current_price || 0; valB = b.current_price || 0; break;
                    case '1h': valA = a.price_change_percentage_1h_in_currency || 0; valB = b.price_change_percentage_1h_in_currency || 0; break;
                    case '24h': valA = a.price_change_percentage_24h_in_currency || 0; valB = b.price_change_percentage_24h_in_currency || 0; break;
                    case '7d': valA = a.price_change_percentage_7d_in_currency || 0; valB = b.price_change_percentage_7d_in_currency || 0; break;
                    case 'marketCap': valA = a.market_cap || 0; valB = b.market_cap || 0; break;
                    default: valA = a.market_cap_rank || 0; valB = b.market_cap_rank || 0;
                }
                return direction === 'asc' ? valA - valB : valB - valA;
            });
            return sorted;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const sortedData = sortData(cryptoData, currentSort, sortDirection);

            sortedData.forEach((coin, index) => {
                const row = document.createElement('tr');
                row.addEventListener('click', () => openChart(coin.id, coin.name));

                const formatPercent = (val) => {
                    if (val === null || val === undefined) return '<span class="neutral">N/A</span>';
                    const formatted = Math.abs(val).toFixed(2) + '%';
                    let className, arrow;
                    if (val > 0.5) { className = 'positive'; arrow = '↑'; }
                    else if (val < -0.5) { className = 'negative'; arrow = '↓'; }
                    else { className = 'neutral'; arrow = val >= 0 ? '↑' : '↓'; }
                    return `<span class="${className}">${arrow} ${formatted}</span>`;
                };

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><div class="coin-name"><img src="${coin.image}" alt="${coin.name}"><span>${coin.name.toUpperCase()}</span></div></td>
                    <td class="price">${formatPrice(coin.current_price)}</td>
                    <td class="market-cap">${formatMarketCap(coin.market_cap)}</td>
                    <td>${formatPercent(coin.price_change_percentage_1h_in_currency)}</td>
                    <td>${formatPercent(coin.price_change_percentage_24h_in_currency)}</td>
                    <td>${formatPercent(coin.price_change_percentage_7d_in_currency)}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            const table = document.getElementById('cryptoTable');
            table.style.display = 'table';
            
            setTimeout(() => {
                table.classList.add('visible');
                const rows = table.querySelectorAll('tbody tr');
                rows.forEach((row, i) => setTimeout(() => row.classList.add('visible'), i * 80));
            }, 100);
        }

        // Обновление цен в реальном времени
        function updatePrices() {
            fetchCryptoData().then(() => {
                // После получения новых данных, обновляем строки таблицы
                const sortedData = sortData(cryptoData, currentSort, sortDirection);
                const rows = document.querySelectorAll('#tableBody tr');
                
                sortedData.forEach((coin, index) => {
                    const row = rows[index];
                    if (!row) return;
                    
                    const formatPercent = (val) => {
                        if (val === null || val === undefined) return '<span class="neutral">N/A</span>';
                        const formatted = Math.abs(val).toFixed(2) + '%';
                        let className, arrow;
                        if (val > 0.5) { className = 'positive'; arrow = '↑'; }
                        else if (val < -0.5) { className = 'negative'; arrow = '↓'; }
                        else { className = 'neutral'; arrow = val >= 0 ? '↑' : '↓'; }
                        return `<span class="${className}">${arrow} ${formatted}</span>`;
                    };
                    
                    // Обновляем только ячейки с ценой, капитализацией и процентами
                    const cells = row.querySelectorAll('td');
                    cells[2].innerHTML = formatPrice(coin.current_price); // Цена
                    cells[3].innerHTML = formatMarketCap(coin.market_cap); // Капитализация
                    cells[4].innerHTML = formatPercent(coin.price_change_percentage_1h_in_currency); // 1ч %
                    cells[5].innerHTML = formatPercent(coin.price_change_percentage_24h_in_currency); // 24ч %
                    cells[6].innerHTML = formatPercent(coin.price_change_percentage_7d_in_currency); // 7д %
                    
                    // Обновляем имя монеты (на всякий случай)
                    const coinNameDiv = cells[1].querySelector('.coin-name');
                    coinNameDiv.innerHTML = `<img src="${coin.image}" alt="${coin.name}"><span>${coin.name.toUpperCase()}</span>`;
                });
            }).catch(error => {
                console.error('Ошибка обновления цен:', error);
            });
        }

        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sortType = e.currentTarget.dataset.sort;
                if (currentSort === sortType) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                else { currentSort = sortType; sortDirection = 'desc'; }
                
                document.querySelectorAll('.sort-btn').forEach(b => {
                    b.classList.remove('active');
                    const arrow = b.querySelector('.arrow');
                    if (arrow) arrow.textContent = '↕';
                });
                e.currentTarget.classList.add('active');
                const arrow = e.currentTarget.querySelector('.arrow');
                arrow.textContent = sortDirection === 'asc' ? '↑' : '↓';
                renderTable();
            });
        });

        function openChart(coinId, coinName) {
            if (isFetching) { showToast("ПОДОЖДИТЕ..."); return; }
            currentCoinId = coinId;
            document.getElementById('chartModal').style.display = 'block';
            document.getElementById('chartTitle').innerText = `📈 ${coinName.toUpperCase()}`;
            document.getElementById('modalContent').classList.add('show');
            
            document.querySelectorAll('.timeframe-buttons button').forEach(btn => btn.classList.remove('active'));
            document.querySelector('button[data-days="7"]').classList.add('active');
            loadChartData(7);
        }

        document.querySelector('.close').addEventListener('click', () => {
            document.getElementById('modalContent').classList.remove('show');
            setTimeout(() => {
                document.getElementById('chartModal').style.display = 'none';
                if (chart) { chart.destroy(); chart = null; }
            }, 300);
        });

        window.addEventListener('click', (e) => {
            if (e.target.id === 'chartModal') {
                document.getElementById('modalContent').classList.remove('show');
                setTimeout(() => document.getElementById('chartModal').style.display = 'none', 300);
            }
        });

        document.querySelectorAll('.timeframe-buttons button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (isFetching) return;
                document.querySelectorAll('.timeframe-buttons button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                loadChartData(parseInt(e.target.dataset.days));
            });
        });

        async function loadChartData(days, retries = 2) {
            isFetching = true;
            const buttons = document.querySelectorAll('.timeframe-buttons button');
            buttons.forEach(b => b.disabled = true);

            try {
                const url = `https://api.coingecko.com/api/v3/coins/${currentCoinId}/market_chart?vs_currency=usd&days=${days}`;
                let response;
                for (let i = 0; i <= retries; i++) {
                    try {
                        response = await fetch(url);
                        if (response.ok) break;
                        if (response.status === 429) await new Promise(r => setTimeout(r, 2000));
                    } catch (e) {
                        if (i === retries) throw e;
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                renderChart(data.prices, days);
            } catch (error) {
                console.error(error);
                showToast("ОШИБКА ЗАГРУЗКИ ГРАФИКА");
            } finally {
                isFetching = false;
                buttons.forEach(b => b.disabled = false);
            }
        }

        function renderChart(prices, days) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chart) chart.destroy();

            const labels = prices.map(p => {
                const d = new Date(p[0]);
                if (days === 1) return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                if (days <= 30) return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
                return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit' });
            });

            const lineColor = '#60a5fa';
            const gradTop = 'rgba(96, 165, 250, 0.5)';
            const gradBot = 'rgba(96, 165, 250, 0.1)';

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, gradTop);
            gradient.addColorStop(1, gradBot);

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'ЦЕНА (USD)',
                        data: prices.map(p => p[1]),
                        borderColor: lineColor,
                        backgroundColor: gradient,
                        borderWidth: 4,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 8,
                        pointHoverBackgroundColor: lineColor,
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(30, 64, 175, 0.95)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            callbacks: { label: ctx => `$${ctx.parsed.y.toLocaleString()}` }
                        }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.08)' }, ticks: { color: '#a0c0e0' } },
                        y: { grid: { color: 'rgba(255,255,255,0.08)' }, ticks: { color: '#a0c0e0', callback: v => '$' + v.toLocaleString() } }
                    },
                    interaction: { mode: 'nearest', axis: 'x', intersect: false }
                }
            });
        }

        // Запуск при загрузке
        fetchCryptoData();
        
        // Автоматическое обновление цен каждые 5 секунд
        setInterval(updatePrices, 5000);
    </script>
</body>
</html>
